name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          
      - name: Verify Dependencies
        run: go mod verify
        
      - name: Build
        run: go build -v ./...
        
      - name: Run Tests
        run: go test -v ./...
        
      - name: Format Code
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted properly:"
            gofmt -s -l .
            exit 1
          fi
