database: tfdriftctl.db

api:
  addr: ":8443"
  tls_cert: "cert.pem"
  tls_key: "key.pem"
  jwt_secret: "<CHANGE_ME_JWT_SECRET>"
  admin_password: "<CHANGE_ME_ADMIN_PASSWORD>"

workspaces:
  - name: aws-s3-test
    provider: aws
    state:
      backend: local
      path: example-aws-infra/terraform.tfstate
    regions:
      - us-east-1
    compare:
      ignore_tags:
        - tfdriftctl_scan
    schedule:
      cron: "0 */6 * * *"
