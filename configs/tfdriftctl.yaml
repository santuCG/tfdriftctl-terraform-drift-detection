database: tfdriftctl.db

api:
  addr: ":8443"
  tls_cert: "cert.pem"
  tls_key: "key.pem"
  jwt_secret: "my-super-secret-key-2026!"
  admin_password: "admin"

workspaces:
  - name: aws-s3-test
    provider: aws
    state:
      backend: local
      path: example-aws-infra/terraform.tfstate
    regions:
      - us-east-1
    compare:
      ignore_tags:
        - tfdriftctl_scan
    schedule:
      cron: "0 */6 * * *"
